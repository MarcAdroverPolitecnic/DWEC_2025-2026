version: '3.8'

services:
  # Development service
  quasar-dev:
    build:
      context: .
      target: development
    container_name: quasar-stadium-dev
    ports:
      - "9000:9000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true

  # Production service
  quasar-prod:
    build:
      context: .
      target: production
    container_name: quasar-stadium-prod
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
